[project]
name = "cyberguard-agents"
version = "0.1.0"
description = "CyberGuard LangGraph agents — reachability, exploit research, report generation"
requires-python = ">=3.11"
dependencies = [
    "cyberguard-pipeline",
    "langgraph>=0.2",
    "langchain-core>=0.3",
    "langchain-openai>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agents"]

[tool.uv.sources]
cyberguard-pipeline = {workspace = true}
