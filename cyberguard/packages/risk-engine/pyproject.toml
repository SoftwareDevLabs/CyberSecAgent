[project]
name = "cyberguard-risk-engine"
version = "0.1.0"
description = "CyberGuard risk engine — contextual risk scoring with domain-specific weights"
requires-python = ">=3.11"
dependencies = [
    "cyberguard-domain-engine",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["risk_engine"]

[tool.uv.sources]
cyberguard-domain-engine = {workspace = true}
